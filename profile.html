<!DOCTYPE html>
<html>
<head>
<title>Profile - MF Voice Party</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

.box{
  background:#1e293b;
  margin:10px;
  padding:15px;
  border-radius:10px;
}

img{
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
}

input{
  padding:8px;
  width:70%;
}

button{
  padding:8px;
  margin:5px;
  background:#00e5ff;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>👤 PROFILE</h2>

<div class="box">
<img id="avatar" src="https://i.ibb.co/placeholder.png">

<br><br>

<input id="nameInput" placeholder="Enter name">

<br>

<button onclick="updateProfile()">Update Profile</button>
</div>

<div class="box">
<h3>🆔 User Info</h3>
<p>ID: <span id="id"></span></p>
<p>Coins: <span id="coins"></span></p>
<p>Level: <span id="level"></span></p>
</div>

<div class="box">
<h3>💞 Relation</h3>
<p id="relation">None</p>
</div>

<script>

// 🔥 Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBUAR6JQU1bZzj2eCkzwvtIbPuRhpwf4Ds",
  authDomain: "global-voice-chat-app.firebaseapp.com",
  databaseURL: "https://global-voice-chat-app-default-rtdb.firebaseio.com/",
  projectId: "global-voice-chat-app"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

// UID
const uid = new URLSearchParams(location.search).get("uid");

// LOAD PROFILE
function loadProfile(){

  db.ref("users/"+uid).on("value", snap=>{

    let data = snap.val();

    if(!data) return;

    document.getElementById("nameInput").value = data.name || "";
    document.getElementById("coins").innerText = data.coins || 0;
    document.getElementById("level").innerText = data.level || 1;
    document.getElementById("id").innerText = data.idNumber || "N/A";

    if(data.avatar){
      document.getElementById("avatar").src = data.avatar;
    }

  });

}

// UPDATE PROFILE
function updateProfile(){

  let name = document.getElementById("nameInput").value;

  db.ref("users/"+uid).update({
    name:name
  });

  alert("Profile Updated ✅");
}

// LOAD RELATION (CP / FRIEND / BROTHER)
function loadRelation(){

  db.ref("relations/"+uid).on("value", snap=>{

    let data = snap.val();

    let text = "None";

    if(data){
      text = Object.values(data).join(", ");
    }

    document.getElementById("relation").innerText = text;

  });

}

loadProfile();
loadRelation();

</script>

</body>
</html>
