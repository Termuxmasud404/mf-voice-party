<!DOCTYPE html>
<html>
<head>
<title>Greedy Game - MF Voice Party</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

.box{
  background:#1e293b;
  margin:10px;
  padding:15px;
  border-radius:10px;
}

button{
  padding:10px;
  margin:5px;
  background:#00e5ff;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>💰 GREEDY GAME</h2>

<div class="box">
<p>Take Risk & Win Coins 🎲</p>

<p>Coins: <span id="coins">0</span></p>

<input id="bet" type="number" placeholder="Enter Bet Coins">

<br>

<button onclick="play()">PLAY</button>
<button onclick="safe()">SAFE EXIT</button>

<p id="msg"></p>
</div>

<script>

// 🔥 Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBUAR6JQU1bZzj2eCkzwvtIbPuRhpwf4Ds",
  authDomain: "global-voice-chat-app.firebaseapp.com",
  databaseURL: "https://global-voice-chat-app-default-rtdb.firebaseio.com/",
  projectId: "global-voice-chat-app"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const uid = new URLSearchParams(location.search).get("uid");

let coins = 0;

// load user
function loadUser(){

  db.ref("users/"+uid).on("value", snap=>{
    let data = snap.val();
    if(!data) return;

    coins = data.coins || 0;
    document.getElementById("coins").innerText = coins;
  });

}

// PLAY GAME
function play(){

  let bet = parseInt(document.getElementById("bet").value);

  if(!bet || bet <= 0){
    alert("Enter valid bet");
    return;
  }

  if(bet > coins){
    alert("Not enough coins!");
    return;
  }

  let win = Math.random() > 0.5;

  if(win){

    let reward = bet * 2;
    coins += bet;

    document.getElementById("msg").innerText = "🎉 You WON "+reward+" coins!";

  } else {

    coins -= bet;

    document.getElementById("msg").innerText = "😢 You LOST "+bet+" coins!";

  }

  db.ref("users/"+uid).update({
    coins: coins
  });

  document.getElementById("coins").innerText = coins;
}

// SAFE EXIT
function safe(){

  document.getElementById("msg").innerText = "✔ You exited safely";

}

loadUser();

</script>

</body>
</html>
