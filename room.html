<!DOCTYPE html>
<html>
<head>
<title>MF Voice Party</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>

<body style="background:#0f172a;color:white;text-align:center;font-family:Arial">

<h1>🎤 MF Voice Party Room</h1>

<!-- ROOM CONTROLS -->
<input id="roomName" placeholder="Create / Join Room" style="padding:10px;width:200px;">
<button onclick="joinRoom()">Join Room</button>

<h3>Room: <span id="currentRoom">None</span></h3>

<hr>

<!-- CHAT BOX -->
<div id="chatBox" style="height:250px;overflow:auto;background:#1e293b;padding:10px;margin:10px;"></div>

<input id="msg" placeholder="Type message..." style="padding:10px;width:60%;">
<button onclick="sendMsg()">Send</button>

<hr>

<!-- VOICE -->
<h2>🎤 Voice Chat</h2>
<button onclick="startVoice()">Start Mic</button>
<button onclick="stopVoice()">Stop Mic</button>
<p id="voiceStatus">Mic OFF</p>

<script>

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBUAR6JQU1bZzj2eCkzwvtIbPuRhpwf4Ds",
  authDomain: "global-voice-chat-app.firebaseapp.com",
  projectId: "global-voice-chat-app",
  storageBucket: "global-voice-chat-app.firebasestorage.app",
  messagingSenderId: "876616774880",
  appId: "1:876616774880:web:b0f7b1a9140df57307cc85",
  databaseURL: "https://global-voice-chat-app-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentRoom = "";
let localStream;

// 🏠 Join Room
function joinRoom(){
  let room = document.getElementById("roomName").value;
  if(!room) return;

  currentRoom = room;
  document.getElementById("currentRoom").innerText = room;

  listenMessages();
}

// 💬 Send Message
function sendMsg(){
  let msg = document.getElementById("msg").value;
  if(!msg || !currentRoom) return;

  db.ref("rooms/" + currentRoom + "/messages").push({
    text: msg,
    time: Date.now()
  });

  document.getElementById("msg").value = "";
}

// 📩 Listen Chat
function listenMessages(){
  db.ref("rooms/" + currentRoom + "/messages").on("child_added", snap=>{
    let data = snap.val();

    let div = document.createElement("div");
    div.innerHTML = "💬 " + data.text;

    document.getElementById("chatBox").appendChild(div);
  });
}

// 🎤 START VOICE
async function startVoice(){
  try{
    localStream = await navigator.mediaDevices.getUserMedia({ audio:true });
    document.getElementById("voiceStatus").innerText = "Mic ON 🔊";

    let audio = document.createElement("audio");
    audio.srcObject = localStream;
    audio.autoplay = true;
    document.body.appendChild(audio);

  }catch(e){
    alert("Mic permission denied");
  }
}

// 📴 STOP VOICE
function stopVoice(){
  if(localStream){
    localStream.getTracks().forEach(t=>t.stop());
  }
  document.getElementById("voiceStatus").innerText = "Mic OFF 🔇";
}

</script>

</body>
</html>
