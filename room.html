<!DOCTYPE html>
<html>
<head>
<title>Room</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="/socket.io/socket.io.js"></script>

<style>
body{background:#0f172a;color:white;font-family:Arial;text-align:center}

.seats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px;
}

.seat{
  background:#1e293b;
  padding:10px;
  border-radius:10px;
}
button{padding:5px;margin:5px}
</style>
</head>

<body>

<h2>🎤 Voice Room</h2>

<div id="roomIdText"></div>

<h3>🪑 Seats</h3>
<div class="seats" id="seats"></div>

<h3>💬 Chat</h3>
<div id="chat"></div>
<input id="msg">
<button onclick="send()">Send</button>

<script>

const socket = io();

const firebaseConfig = {
  apiKey: "AIzaSyBUAR6JQU1bZzj2eCkzwvtIbPuRhpwf4Ds",
  authDomain: "global-voice-chat-app.firebaseapp.com",
  databaseURL: "https://global-voice-chat-app-default-rtdb.firebaseio.com/",
  projectId: "global-voice-chat-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const params = new URLSearchParams(location.search);
const roomId = params.get("roomId");
const uid = params.get("uid");

document.getElementById("roomIdText").innerText = roomId;

// seats
let seats = Array(8).fill(null);

function renderSeats(){

  let box = document.getElementById("seats");
  box.innerHTML="";

  seats.forEach((u,i)=>{

    let div = document.createElement("div");
    div.className="seat";

    if(u){
      div.innerHTML = "👤 "+u;
    }else{
      div.innerHTML = `<button onclick="joinSeat(${i})">Join</button>`;
    }

    box.appendChild(div);
  });

}

function joinSeat(i){
  seats[i]=uid;
  db.ref("rooms/"+roomId+"/seats").set(seats);
}

// listen seats
db.ref("rooms/"+roomId+"/seats").on("value", snap=>{
  seats = snap.val() || Array(8).fill(null);
  renderSeats();
});

renderSeats();

// chat
function send(){
  let msg = document.getElementById("msg").value;

  db.ref("rooms/"+roomId+"/chat").push({
    uid,
    msg
  });
}

db.ref("rooms/"+roomId+"/chat").on("child_added", snap=>{
  let d = snap.val();
  let div = document.createElement("div");
  div.innerText = d.uid + ": " + d.msg;
  document.getElementById("chat").appendChild(div);
});


// ===== VOICE SYSTEM =====
let stream;
let peers = {};

socket.emit("join-room", roomId);

async function startVoice(){

  stream = await navigator.mediaDevices.getUserMedia({audio:true});

  socket.on("user-joined", (id)=>{
    createPeer(id);
  });

  socket.on("signal", async (data)=>{

    if(!peers[data.from]){
      createPeer(data.from);
    }

    await peers[data.from].setRemoteDescription(data.signal);

    if(data.signal.type==="offer"){

      let answer = await peers[data.from].createAnswer();
      await peers[data.from].setLocalDescription(answer);

      socket.emit("signal", {
        to:data.from,
        signal:peers[data.from].localDescription
      });
    }

  });

}

function createPeer(id){

  const pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  peers[id]=pc;

  stream.getTracks().forEach(t=>pc.addTrack(t,stream));

  pc.ontrack=(e)=>{
    let audio=document.createElement("audio");
    audio.srcObject=e.streams[0];
    audio.autoplay=true;
    document.body.appendChild(audio);
  };

  pc.createOffer().then(o=>{
    pc.setLocalDescription(o);

    socket.emit("signal",{
      to:id,
      signal:o
    });
  });

}

startVoice();

</script>

</body>
</html>
