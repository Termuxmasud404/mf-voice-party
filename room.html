<!DOCTYPE html>
<html>
<head>
<title>MF Voice Party - Room</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

.header{
  background:#1e293b;
  padding:10px;
}

.box{
  background:#1e293b;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

.seats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px;
}

.seat{
  background:#111827;
  padding:10px;
  border-radius:8px;
  min-height:50px;
}

button{
  padding:6px;
  margin:3px;
  background:#00e5ff;
  border:none;
  cursor:pointer;
}
input{
  padding:8px;
  width:60%;
}
</style>
</head>

<body>

<div class="header">
<h3>🎤 ROOM</h3>
<p>Room ID: <span id="roomIdText"></span></p>
</div>

<!-- SEATS -->
<div class="box">
<h3>🪑 Seats (8 Users)</h3>
<div class="seats" id="seats"></div>
</div>

<!-- CHAT -->
<div class="box">
<h3>💬 Chat</h3>
<div id="chatBox" style="height:120px;overflow:auto;background:#0f172a;"></div>
<input id="msg">
<button onclick="sendMsg()">Send</button>
</div>

<!-- VOICE -->
<div class="box">
<h3>🎤 Voice</h3>
<button onclick="startMic()">Mic ON</button>
<button onclick="stopMic()">Mic OFF</button>
<p id="voiceStatus">OFF</p>
</div>

<!-- GIFT -->
<div class="box">
<h3>🎁 Gift</h3>
<button onclick="sendGift('rose')">🌹 Rose</button>
<button onclick="sendGift('heart')">❤️ Heart</button>
</div>

<script>

// 🔥 Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBUAR6JQU1bZzj2eCkzwvtIbPuRhpwf4Ds",
  authDomain: "global-voice-chat-app.firebaseapp.com",
  databaseURL: "https://global-voice-chat-app-default-rtdb.firebaseio.com/",
  projectId: "global-voice-chat-app"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

// URL DATA
const urlParams = new URLSearchParams(window.location.search);
const roomId = urlParams.get("roomId");
const uid = urlParams.get("uid");

document.getElementById("roomIdText").innerText = roomId;

// 🪑 CREATE SEATS (8 SEATS)
let seats = [];

for(let i=0;i<8;i++){
  seats.push(null);
}

function renderSeats(){

  let box = document.getElementById("seats");
  box.innerHTML = "";

  seats.forEach((user, index)=>{

    let div = document.createElement("div");
    div.className = "seat";

    if(user){
      div.innerHTML = `
        👤 ${user}<br>
        <button onclick="mute(${index})">Mute</button>
      `;
    } else {
      div.innerHTML = `<button onclick="joinSeat(${index})">Join Seat</button>`;
    }

    box.appendChild(div);
  });

}

// 🪑 JOIN SEAT
function joinSeat(index){
  seats[index] = uid;

  db.ref("rooms/"+roomId+"/seats").set(seats);

  renderSeats();
}

// 🔇 MUTE (basic)
function mute(index){
  alert("Muted user (demo)");
}

// 💬 CHAT
function sendMsg(){

  let msg = document.getElementById("msg").value;
  if(!msg) return;

  db.ref("rooms/"+roomId+"/chat").push({
    user: uid,
    text: msg
  });

  document.getElementById("msg").value="";
}

// LIVE CHAT
db.ref("rooms/"+roomId+"/chat").on("child_added", snap=>{

  let d = snap.val();

  let div = document.createElement("div");
  div.innerHTML = "💬 " + d.user + ": " + d.text;

  document.getElementById("chatBox").appendChild(div);

});

// 🎁 GIFT
function sendGift(type){

  db.ref("rooms/"+roomId+"/gifts").push({
    user: uid,
    type: type
  });

  alert("Gift sent 🎁");
}

// 🎤 MIC (basic)
let stream;

async function startMic(){
  stream = await navigator.mediaDevices.getUserMedia({audio:true});
  document.getElementById("voiceStatus").innerText = "ON 🔊";
}

function stopMic(){
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
  }
  document.getElementById("voiceStatus").innerText = "OFF";
}

// LOAD SEATS
db.ref("rooms/"+roomId+"/seats").on("value", snap=>{

  let data = snap.val();

  if(data){
    seats = data;
  }

  renderSeats();

});

renderSeats();

</script>

</body>
</html>
