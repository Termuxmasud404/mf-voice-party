<!DOCTYPE html>
<html>
<head>
<title>MF Voice Party PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>

<body style="background:#0f172a;color:white;text-align:center;font-family:Arial">

<h1>🎤 MF Voice Party PRO</h1>

<!-- ROOM -->
<input id="room" placeholder="Room name" style="padding:10px;width:200px;">
<button onclick="joinRoom()">Join</button>

<h3>Room: <span id="currentRoom">None</span></h3>

<hr>

<!-- COIN SYSTEM -->
<h2>🪙 Coins: <span id="coins">0</span></h2>
<button onclick="earnCoins()">🎮 Play Game (Earn Coins)</button>

<hr>

<!-- CHAT -->
<div id="chatBox" style="height:200px;overflow:auto;background:#1e293b;margin:10px;padding:10px;"></div>

<input id="msg" placeholder="message..." style="padding:10px;width:60%;">
<button onclick="sendMsg()">Send</button>

<hr>

<!-- GIFT -->
<h2>🎁 Gift</h2>
<button onclick="sendGift('rose')">🌹 Rose (10 coins)</button>
<button onclick="sendGift('heart')">❤️ Heart (20 coins)</button>

<hr>

<!-- VOICE -->
<h2>🎤 Voice</h2>
<button onclick="startVoice()">Start Mic</button>
<button onclick="stopVoice()">Stop Mic</button>
<p id="voiceStatus">OFF</p>

<script>

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBUAR6JQU1bZzj2eCkzwvtIbPuRhpwf4Ds",
  authDomain: "global-voice-chat-app.firebaseapp.com",
  projectId: "global-voice-chat-app",
  storageBucket: "global-voice-chat-app.firebasestorage.app",
  messagingSenderId: "876616774880",
  appId: "1:876616774880:web:b0f7b1a9140df57307cc85",
  databaseURL: "https://global-voice-chat-app-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let room = "";
let coins = 0;
let localStream;

// 🏠 JOIN ROOM
function joinRoom(){
  room = document.getElementById("room").value;
  document.getElementById("currentRoom").innerText = room;

  listenMessages();
}

// 💬 CHAT
function sendMsg(){
  let msg = document.getElementById("msg").value;
  if(!msg || !room) return;

  db.ref("rooms/"+room+"/chat").push({
    text: msg,
    time: Date.now()
  });

  document.getElementById("msg").value="";
}

function listenMessages(){
  db.ref("rooms/"+room+"/chat").on("child_added",snap=>{
    let data = snap.val();
    let div = document.createElement("div");
    div.innerHTML = "💬 " + data.text;
    document.getElementById("chatBox").appendChild(div);
  });
}

// 🪙 COIN SYSTEM
function earnCoins(){
  let gain = Math.floor(Math.random()*20)+10;
  coins += gain;
  document.getElementById("coins").innerText = coins;
}

// 🎁 GIFT SYSTEM
function sendGift(type){

  let cost = type=="rose"?10:20;

  if(coins < cost){
    alert("Not enough coins!");
    return;
  }

  coins -= cost;
  document.getElementById("coins").innerText = coins;

  db.ref("rooms/"+room+"/gifts").push({
    type:type,
    time:Date.now()
  });

  alert("Gift sent 🎁");
}

// 🎤 VOICE (basic)
async function startVoice(){
  localStream = await navigator.mediaDevices.getUserMedia({audio:true});
  document.getElementById("voiceStatus").innerText="ON 🔊";
}

function stopVoice(){
  if(localStream){
    localStream.getTracks().forEach(t=>t.stop());
  }
  document.getElementById("voiceStatus").innerText="OFF";
}

</script>

</body>
</html>
