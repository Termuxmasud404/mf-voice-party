<!DOCTYPE html>
<html>
<head>
<title>Home</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{background:#0f172a;color:white;font-family:Arial;text-align:center}
.box{background:#1e293b;margin:10px;padding:10px;border-radius:10px}
button{padding:8px;background:#00e5ff;border:none;cursor:pointer}
input{padding:8px;width:60%}
</style>
</head>

<body>

<h2>🏠 ROOM BOARD</h2>

<div class="box">
<h3>Create Room</h3>
<input id="roomName">
<button onclick="createRoom()">Create</button>
</div>

<div class="box">
<h3>Rooms</h3>
<div id="list"></div>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBUAR6JQU1bZzj2eCkzwvtIbPuRhpwf4Ds",
  authDomain: "global-voice-chat-app.firebaseapp.com",
  databaseURL: "https://global-voice-chat-app-default-rtdb.firebaseio.com/",
  projectId: "global-voice-chat-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const uid = new URLSearchParams(location.search).get("uid");

// create room
function createRoom(){

  let name = document.getElementById("roomName").value;

  let roomId = "room_" + Date.now();

  db.ref("rooms/"+roomId).set({
    name:name,
    owner:uid,
    locked:false
  });

  location.href = "room.html?roomId="+roomId+"&uid="+uid;
}

// load rooms
db.ref("rooms").on("value", snap=>{

  let d = snap.val();
  let box = document.getElementById("list");
  box.innerHTML="";

  for(let id in d){

    let div = document.createElement("div");

    div.innerHTML = `
      <p>🏠 ${d[id].name}</p>
      <button onclick="join('${id}')">Join</button>
      <hr>
    `;

    box.appendChild(div);
  }

});

function join(id){
  location.href = "room.html?roomId="+id+"&uid="+uid;
}

</script>

</body>
</html>
