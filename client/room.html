<!DOCTYPE html>
<html>
<head>
<title>MF Voice Party PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="/socket.io/socket.io.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.header{
  padding:15px;
  background:#1e293b;
}

.container{
  padding:10px;
}

.box{
  background:#1e293b;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}

button{
  padding:8px;
  margin:5px;
  border:none;
  background:#00e5ff;
  cursor:pointer;
}

input{
  padding:8px;
  width:60%;
}
</style>
</head>

<body>

<div class="header">
<h2>🎤 MF Voice Party PRO</h2>
</div>

<div class="container">

<!-- ROOM -->
<div class="box">
<input id="room" placeholder="Room ID">
<button onclick="joinRoom()">Join</button>
<p>Room: <span id="currentRoom">None</span></p>
</div>

<!-- COINS -->
<div class="box">
<h3>🪙 Coins: <span id="coins">0</span></h3>
<button onclick="earn()">Earn Coins</button>
</div>

<!-- CHAT -->
<div class="box">
<div id="chatBox" style="height:150px;overflow:auto"></div>
<input id="msg">
<button onclick="send()">Send</button>
</div>

<!-- GIFT -->
<div class="box">
<h3>🎁 Gifts</h3>
<button onclick="gift('rose')">🌹 Rose</button>
<button onclick="gift('heart')">❤️ Heart</button>
</div>

<!-- VOICE -->
<div class="box">
<h3>🎤 Voice</h3>
<button onclick="startMic()">Start</button>
<button onclick="stopMic()">Stop</button>
<p id="voice">OFF</p>
</div>

</div>

<script>

// Firebase (optional future use)
const firebaseConfig = {
  apiKey: "AIzaSyBUAR6JQU1bZzj2eCkzwvtIbPuRhpwf4Ds",
  authDomain: "global-voice-chat-app.firebaseapp.com",
  databaseURL: "https://global-voice-chat-app-default-rtdb.firebaseio.com/",
  projectId: "global-voice-chat-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let room="";
let coins=0;
let stream;

// 🏠 ROOM
function joinRoom(){
  room=document.getElementById("room").value;
  document.getElementById("currentRoom").innerText=room;

  db.ref("rooms/"+room+"/chat").on("child_added",snap=>{
    let d=snap.val();
    let div=document.createElement("div");
    div.innerHTML="💬 "+d.text;
    document.getElementById("chatBox").appendChild(div);
  });
}

// 💬 CHAT
function send(){
  let m=document.getElementById("msg").value;
  if(!m) return;

  db.ref("rooms/"+room+"/chat").push({
    text:m
  });

  document.getElementById("msg").value="";
}

// 🪙 COINS
function earn(){
  coins+=10;
  document.getElementById("coins").innerText=coins;
}

// 🎁 GIFT
function gift(type){
  let cost=type=="rose"?10:20;
  if(coins<cost){alert("No coins");return;}
  coins-=cost;
  document.getElementById("coins").innerText=coins;
  alert("Gift sent 🎁");
}

// 🎤 MIC
async function startMic(){
  stream=await navigator.mediaDevices.getUserMedia({audio:true});
  document.getElementById("voice").innerText="ON 🔊";
}

function stopMic(){
  if(stream) stream.getTracks().forEach(t=>t.stop());
  document.getElementById("voice").innerText="OFF";
}

</script>

</body>
</html>
