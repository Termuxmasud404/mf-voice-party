<!DOCTYPE html>
<html>
<head>
<title>MF Voice Party - Login</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>

<body style="background:#0f172a;color:white;text-align:center;font-family:Arial;padding-top:80px;">

<h1>🎤 MF Voice Party</h1>

<div style="background:#1e293b;padding:20px;width:300px;margin:auto;border-radius:15px;">

<input id="email" type="email" placeholder="Email"
style="padding:10px;width:90%;margin:10px;"><br>

<input id="password" type="password" placeholder="Password"
style="padding:10px;width:90%;margin:10px;"><br>

<button onclick="login()"
style="padding:10px;width:95%;background:#00e5ff;border:none;">
Login
</button>

<button onclick="register()"
style="padding:10px;width:95%;margin-top:10px;background:#22c55e;border:none;">
Register
</button>

<p id="msg"></p>

</div>

<script>

// 🔥 Firebase Config (same project)
const firebaseConfig = {
  apiKey: "AIzaSyBUAR6JQU1bZzj2eCkzwvtIbPuRhpwf4Ds",
  authDomain: "global-voice-chat-app.firebaseapp.com",
  projectId: "global-voice-chat-app",
  storageBucket: "global-voice-chat-app.firebasestorage.app",
  messagingSenderId: "876616774880",
  appId: "1:876616774880:web:b0f7b1a9140df57307cc85"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// ✅ Register
function register(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email,password)
  .then(()=>{
    document.getElementById("msg").innerText = "Account Created ✅";
  })
  .catch(err=>{
    document.getElementById("msg").innerText = err.message;
  });
}

// ✅ Login
function login(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email,password)
  .then(()=>{
    document.getElementById("msg").innerText = "Login Success 🚀";

    setTimeout(()=>{
      window.location.href = "room.html";
    },1000);

  })
  .catch(err=>{
    document.getElementById("msg").innerText = err.message;
  });
}

</script>

</body>
</html>
