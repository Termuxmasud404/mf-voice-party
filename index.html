<!DOCTYPE html>
<html>
<head>
<title>MF Voice Party - Login</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  text-align:center;
  padding-top:80px;
}

.box{
  background:#1e293b;
  width:300px;
  margin:auto;
  padding:20px;
  border-radius:10px;
}

input{
  width:90%;
  padding:10px;
  margin:8px 0;
}

button{
  width:95%;
  padding:10px;
  margin-top:10px;
  background:#00e5ff;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>🎤 MF Voice Party</h2>

<div class="box">

<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<script>

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBUAR6JQU1bZzj2eCkzwvtIbPuRhpwf4Ds",
  authDomain: "global-voice-chat-app.firebaseapp.com",
  databaseURL: "https://global-voice-chat-app-default-rtdb.firebaseio.com/",
  projectId: "global-voice-chat-app"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

// 🧾 REGISTER
function register(){

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
  .then((userCredential)=>{

    let user = userCredential.user;

    // CREATE USER PROFILE
    db.ref("users/"+user.uid).set({
      email: user.email,
      name: email.split("@")[0],
      coins: 100,
      level: 1,
      vip: false,
      idNumber: Math.floor(Math.random()*999999)
    });

    document.getElementById("msg").innerText = "Account Created ✅";

    setTimeout(()=>{
      window.location.href = "home.html?uid="+user.uid;
    },1000);

  })
  .catch(err=>{
    document.getElementById("msg").innerText = err.message;
  });
}

// 🔑 LOGIN
function login(){

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
  .then((userCredential)=>{

    let user = userCredential.user;

    document.getElementById("msg").innerText = "Login Success 🚀";

    setTimeout(()=>{
      window.location.href = "home.html?uid="+user.uid;
    },1000);

  })
  .catch(err=>{
    document.getElementById("msg").innerText = err.message;
  });
}

</script>

</body>
</html>
