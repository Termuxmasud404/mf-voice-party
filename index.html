<!DOCTYPE html>
<html>
<head>
<title>MF Voice Party</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>

<body style="background:#0f172a;color:white;text-align:center;padding-top:80px;">

<h1>🎤 MF Voice Party</h1>

<input id="email" placeholder="Email" style="padding:10px;width:220px"><br><br>
<input id="password" type="password" placeholder="Password" style="padding:10px;width:220px"><br><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<p id="msg"></p>

<script>
// 🔥 তোমার Firebase Config বসানো হলো
const firebaseConfig = {
  apiKey: "AIzaSyBUAR6JQU1bZzj2eCkzwvtIbPuRhpwf4Ds",
  authDomain: "global-voice-chat-app.firebaseapp.com",
  projectId: "global-voice-chat-app",
  storageBucket: "global-voice-chat-app.firebasestorage.app",
  messagingSenderId: "876616774880",
  appId: "1:876616774880:web:b0f7b1a9140df57307cc85",
  measurementId: "G-YTVC8Q7T28"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// ✅ Register
function register(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
  .then(user=>{
    document.getElementById("msg").innerText = "Account Created ✅";
  })
  .catch(err=>{
    document.getElementById("msg").innerText = err.message;
  });
}

// ✅ Login
function login(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
  .then(user=>{
    document.getElementById("msg").innerText = "Login Success 🚀";
    setTimeout(()=>{
      window.location.href = "room.html";
    }, 1000);
  })
  .catch(err=>{
    document.getElementById("msg").innerText = err.message;
  });
}
</script>

</body>
</html>
