<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MF Voice Party</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:90%;
max-width:400px;
background:#1e293b;
padding:30px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.5);
}

.logo{
text-align:center;
font-size:32px;
font-weight:bold;
margin-bottom:20px;
}

.logo span{
color:#00e5ff;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#00e5ff;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.8;
}

.links{
text-align:center;
margin-top:15px;
}

a{
color:#00e5ff;
text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
MF <span>VOICE</span> PARTY
</div>

<input type="email" placeholder="Email">
<input type="password" placeholder="Password">

<button>Login</button>

<div class="links">
<p>
No account?
<a href="register.html">Register</a>
</p>
</div>

</div>

</body>
</html>
